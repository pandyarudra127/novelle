services:
  mongodb:
    image: mongo:7
    container_name: novelle-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: novelle

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: novelle-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      VITE_API_URL: /api

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: novelle-server
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/novelle
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000

volumes:
  mongodb_data:
